<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canchas - Reserva tu Hora</title>
  <link href="tailwind.css" rel="stylesheet">
  <style>
    * { font-family: system-ui, -apple-system, sans-serif; }
    body { background: #0f0f1a; }
    .sport-badge { display: inline-flex; align-items: center; gap: 4px; }
    .card { transition: transform 0.2s, box-shadow 0.2s; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,210,106,0.15); }
    .slot { transition: all 0.15s; }
    .slot:not(.booked):hover { background: #00d26a22; border-color: #00d26a; cursor: pointer; }
    .slot.booked { opacity: 0.4; cursor: not-allowed; text-decoration: line-through; }
    .progress-bar { transition: width 0.3s; }
    .toast { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .modal-backdrop { animation: fadeIn 0.2s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body class="text-white min-h-screen">

  <!-- Toast Container -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

  <!-- Header -->
  <header class="bg-card border-b border-gray-800 sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3 cursor-pointer" onclick="navigate('home')">
        <span class="text-3xl">🏟️</span>
        <h1 class="text-xl font-bold text-primary">Canchas</h1>
      </div>
      <nav class="flex gap-4 text-sm">
        <button onclick="navigate('home')" class="hover:text-primary transition" id="nav-courts">Canchas</button>
        <button onclick="navigate('games')" class="hover:text-primary transition" id="nav-games">Cupos Libres</button>
        <button onclick="navigate('my-bookings')" class="hover:text-primary transition" id="nav-my">Mis Reservas</button>
        <button onclick="navigate('admin')" class="hover:text-accent transition text-accent" id="nav-admin">Admin</button>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main id="app" class="max-w-6xl mx-auto px-4 py-8"></main>

  <!-- Modal Container -->
  <div id="modal-container"></div>

  <script>
    // ==================== STATE ====================
    const API = '/canchas/api';
    let currentPage = 'home';
    let sports = [];
    let courts = [];

    // ==================== UTILS ====================
    function toast(message, type = 'success') {
      const colors = {
        success: 'bg-primary',
        error: 'bg-red-500',
        info: 'bg-blue-500'
      };
      const t = document.createElement('div');
      t.className = `toast px-4 py-3 rounded-lg text-white text-sm font-medium ${colors[type]}`;
      t.textContent = message;
      document.getElementById('toast-container').appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    async function api(path, options = {}) {
      const res = await fetch(API + path, options);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error');
      return data;
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString('es-UY', { weekday: 'short', day: 'numeric', month: 'short' });
    }

    function navigate(page, params = {}) {
      currentPage = page;
      const query = new URLSearchParams(params).toString();
      window.location.hash = query ? `#${page}?${query}` : `#${page}`;
    }

    function getPageFromHash() {
      const hash = window.location.hash.slice(1) || 'home';
      const [page, query] = hash.split('?');
      return { page, query: Object.fromEntries(new URLSearchParams(query || '')) };
    }

    // ==================== MODALS ====================
    function openModal(content) {
      const container = document.getElementById('modal-container');
      container.innerHTML = `
        <div class="modal-backdrop fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4" onclick="closeModal(event)">
          <div class="bg-card rounded-xl w-full max-w-md border border-gray-700" onclick="event.stopPropagation()">
            ${content}
          </div>
        </div>
      `;
    }

    function closeModal(event) {
      if (event && event.target !== event.currentTarget) return;
      document.getElementById('modal-container').innerHTML = '';
    }

    // ==================== PAGES ====================
    async function renderHome(params = {}) {
      const app = document.getElementById('app');
      const selectedSport = params.sport || '';

      if (sports.length === 0) sports = await api('/sports');
      courts = await api('/courts' + (selectedSport ? `?sport=${selectedSport}` : ''));

      const sportOptions = sports.map(s => 
        `<option value="${s.id}" ${selectedSport === s.id ? 'selected' : ''}>${s.emoji} ${s.name}</option>`
      ).join('');

      app.innerHTML = `
        <div class="mb-6">
          <h2 class="text-2xl font-bold mb-4">🏟️ Canchas Disponibles</h2>
          <div class="flex gap-3 items-center flex-wrap">
            <select onchange="navigate('home', {sport: this.value})" class="bg-card border border-gray-700 rounded-lg px-4 py-2 text-white">
              <option value="">Todos los deportes</option>
              ${sportOptions}
            </select>
            ${selectedSport ? `<span class="text-gray-400 text-sm">${sports.find(s=>s.id===selectedSport)?.emoji} Filtrado</span>` : ''}
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          ${courts.length === 0 ? `<p class="text-gray-400 col-span-full">No hay canchas${selectedSport ? " de ese deporte" : ""}.</p>` : ''}
          ${courts.map(c => `
            <div class="card bg-card rounded-xl p-5 border border-gray-800">
              <div class="flex justify-between items-start mb-3">
                <div>
                  <h3 class="font-semibold text-lg">${c.name}</h3>
                  <span class="sport-badge text-sm text-gray-400">${c.sport_info.emoji} ${c.sport_info.name}</span>
                </div>
                ${c.active ? '<span class="bg-primary/20 text-primary text-xs px-2 py-1 rounded-full">Activa</span>' : '<span class="bg-gray-700 text-gray-400 text-xs px-2 py-1 rounded-full">Inactiva</span>'}
              </div>
              <p class="text-gray-400 text-sm mb-3">📍 ${c.location || 'Sin ubicación'}</p>
              <div class="flex justify-between items-center">
                <span class="text-primary font-bold">$${c.price_hour}/hora</span>
                <button onclick="navigate('court', {id: ${c.id}, sport: '${selectedSport}'})" class="bg-primary hover:bg-primary-darker text-black font-medium px-4 py-2 rounded-lg text-sm transition">
                  Reservar
                </button>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    async function renderCourt(params = {}) {
      const { id, sport } = params;
      const app = document.getElementById('app');
      
      const court = await api(`/courts/${id}`);
      const today = new Date().toISOString().split('T')[0];
      const selectedDate = params.date || today;

      app.innerHTML = `
        <button onclick="navigate('home', {sport: '${sport}' || ''})" class="mb-4 text-gray-400 hover:text-white flex items-center gap-1 text-sm">
          ← Volver a canchas
        </button>
        <div class="bg-card rounded-xl p-6 border border-gray-800 mb-6">
          <div class="flex justify-between items-start">
            <div>
              <h2 class="text-2xl font-bold">${court.name}</h2>
              <span class="sport-badge text-gray-400">${court.sport_info.emoji} ${court.sport_info.name}</span>
            </div>
            <span class="text-primary font-bold text-xl">$${court.price_hour}/hora</span>
          </div>
          <p class="text-gray-400 mt-2">📍 ${court.location || 'Sin ubicación'}</p>
        </div>

        <div class="mb-6">
          <label class="block text-sm text-gray-400 mb-2">Seleccioná la fecha</label>
          <input type="date" id="date-input" value="${selectedDate}" min="${today}"
            onchange="navigate('court', {id: ${id}, sport: '${sport}', date: this.value})"
            class="bg-card border border-gray-700 rounded-lg px-4 py-2 text-white">
        </div>

        <h3 class="font-semibold mb-3">Horarios disponibles</h3>
        <div id="slots-container" class="text-sm">
          <p class="text-gray-400">Cargando...</p>
        </div>
      `;

      loadSlots(id, selectedDate);
    }

    async function loadSlots(courtId, date) {
      try {
        const { slots, court: c } = await api(`/courts/${courtId}/slots?date=${date}`);
        const container = document.getElementById('slots-container');
        
        container.innerHTML = `
          <div class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-2">
            ${slots.map(s => `
              <div class="slot border border-gray-700 rounded-lg p-3 text-center ${s.available ? '' : 'booked'}"
                   ${s.available ? `onclick="openBookingModal(${courtId}, '${date}', '${s.time}')"` : ''}>
                <div class="font-medium">${s.time}</div>
                <div class="text-xs text-gray-500">${s.available ? 'Libre' : 'Ocupado'}</div>
              </div>
            `).join('')}
          </div>
        `;
      } catch (e) {
        document.getElementById('slots-container').innerHTML = `<p class="text-red-400">Error cargando horarios</p>`;
      }
    }

    function openBookingModal(courtId, date, time) {
      openModal(`
        <div class="p-6">
          <h3 class="text-xl font-bold mb-4">Reservar ${time}</h3>
          <form onsubmit="submitBooking(event, ${courtId}, '${date}', '${time}')">
            <div class="mb-4">
              <label class="block text-sm text-gray-400 mb-1">Nombre</label>
              <input type="text" id="booking-name" required
                class="w-full bg-dark border border-gray-700 rounded-lg px-4 py-2 text-white"
                placeholder="Tu nombre">
            </div>
            <div class="mb-4">
              <label class="block text-sm text-gray-400 mb-1">Teléfono</label>
              <input type="tel" id="booking-phone" required
                class="w-full bg-dark border border-gray-700 rounded-lg px-4 py-2 text-white"
                placeholder="099 123 456">
            </div>
            <div class="flex gap-3">
              <button type="button" onclick="closeModal()" class="flex-1 bg-gray-700 hover:bg-gray-600 py-2 rounded-lg transition">Cancelar</button>
              <button type="submit" class="flex-1 bg-primary hover:bg-primary-darker text-black font-medium py-2 rounded-lg transition">Confirmar</button>
            </div>
          </form>
        </div>
      `);
    }

    async function submitBooking(e, courtId, date, time) {
      e.preventDefault();
      const name = document.getElementById('booking-name').value.trim();
      const phone = document.getElementById('booking-phone').value.trim();

      try {
        await api('/bookings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ court_id: courtId, date, time, client_name: name, client_phone: phone })
        });
        closeModal();
        toast('¡Reserva confirmada!');
        loadSlots(courtId, date);
      } catch (err) {
        toast(err.message, 'error');
      }
    }

    async function renderGames(params = {}) {
      const app = document.getElementById('app');
      const games = await api('/games');

      const openGames = games.filter(g => !g.is_full);

      app.innerHTML = `
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-bold">🎯 Cupos Libres</h2>
          <button onclick="openNewGameModal()" class="bg-accent hover:bg-accent-darker text-white font-medium px-4 py-2 rounded-lg text-sm transition">
            + Publicar Partido
          </button>
        </div>
        
        ${openGames.length === 0 ? `
          <div class="text-center py-16 text-gray-400">
            <p class="text-4xl mb-4">🏐</p>
            <p>No hay partidos publicados</p>
            <p class="text-sm mt-1">¡Sé el primero en publicar!</p>
          </div>
        ` : `
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            ${openGames.map(g => `
              <div class="card bg-card rounded-xl p-5 border border-gray-800">
                <div class="flex justify-between items-start mb-3">
                  <div>
                    <h3 class="font-semibold">${g.title || g.court_name}</h3>
                    <span class="sport-badge text-sm text-gray-400">${g.sport_info.emoji} ${g.sport_info.name}</span>
                  </div>
                  <span class="text-xs bg-accent/20 text-accent px-2 py-1 rounded-full">
                    ${g.spots_left} lugares
                  </span>
                </div>
                <p class="text-gray-400 text-sm mb-3">📅 ${formatDate(g.date)} · ${g.time}</p>
                <p class="text-gray-400 text-sm mb-3">📍 ${g.location || ''}</p>
                
                <div class="mb-4">
                  <div class="flex justify-between text-xs text-gray-400 mb-1">
                    <span>${g.participants_count}/${g.players_needed} jugadores</span>
                  </div>
                  <div class="h-2 bg-gray-700 rounded-full overflow-hidden">
                    <div class="progress-bar h-full bg-primary rounded-full" 
                         style="width: ${(g.participants_count / g.players_needed) * 100}%"></div>
                  </div>
                </div>

                <button onclick="openJoinGameModal(${g.id})" class="w-full bg-accent hover:bg-accent-darker text-white font-medium py-2 rounded-lg text-sm transition">
                  ¡Me anoto!
                </button>
              </div>
            `).join('')}
          </div>
        `}

        ${games.filter(g => g.is_full).length > 0 ? `
          <h3 class="text-lg font-semibold mt-8 mb-4 text-gray-400">Partidos completos</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 opacity-60">
            ${games.filter(g => g.is_full).map(g => `
              <div class="card bg-card rounded-xl p-5 border border-gray-800">
                <div class="flex justify-between items-start mb-3">
                  <h3 class="font-semibold">${g.title || g.court_name}</h3>
                  <span class="text-xs bg-gray-700 text-gray-400 px-2 py-1 rounded-full">Completo</span>
                </div>
                <p class="text-gray-400 text-sm">📅 ${formatDate(g.date)} · ${g.time}</p>
                <p class="text-gray-400 text-sm">${g.participants_count}/${g.players_needed} jugadores</p>
              </div>
            `).join('')}
          </div>
        ` : ''}
      `;
    }

    async function openNewGameModal() {
      courts = courts.length ? courts : await api('/courts');
      const courtOptions = courts.filter(c => c.active).map(c => 
        `<option value="${c.id}">${c.name} (${c.sport_info?.name || c.sport})</option>`
      ).join('');

      const today = new Date().toISOString().split('T')[0];

      openModal(`
        <div class="p-6">
          <h3 class="text-xl font-bold mb-4">Publicar Partido</h3>
          <form onsubmit="submitNewGame(event)">
            <div class="mb-4">
              <label class="block text-sm text-gray-400 mb-1">Cancha</label>
              <select id="game-court" required class="w-full bg-dark border border-gray-700 rounded-lg px-4 py-2 text-white">
                <option value="">Seleccionar cancha</option>
                ${courtOptions}
              </select>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-4">
              <div>
                <label class="block text-sm text-gray-400 mb-1">Fecha</label>
                <input type="date" id="game-date" required min="${today}"
                  class="w-full bg-dark border border-gray-700 rounded-lg px-4 py-2 text-white">
              </div>
              <div>
                <label class="block text-sm text-gray-400 mb-1">Hora</label>
                <select id="game-time" required class="w-full bg-dark border border-gray-700 rounded-lg px-4 py-2 text-white">
                  ${Array.from({length: 16}, (_, i) => {
                    const h = (i + 8).toString().padStart(2, '0');
                    return `<option value="${h}:00">${h}:00</option>`;
                  }).join('')}
                </select>
              </div>
            </div>
            <div class="mb-4">
              <label class="block text-sm text-gray-400 mb-1">Jugadores necesarios</label>
              <input type="number" id="game-players" required min="1" max="22" value="5"
                class="w-full bg-dark border border-gray-700 rounded-lg px-4 py-2 text-white">
            </div>
            <div class="mb-4">
              <label class="block text-sm text-gray-400 mb-1">Título (opcional)</label>
              <input type="text" id="game-title"
                class="w-full bg-dark border border-gray-700 rounded-lg px-4 py-2 text-white"
                placeholder="Ej: Partido de amigos">
            </div>
            <div class="flex gap-3">
              <button type="button" onclick="closeModal()" class="flex-1 bg-gray-700 hover:bg-gray-600 py-2 rounded-lg transition">Cancelar</button>
              <button type="submit" class="flex-1 bg-accent hover:bg-accent-darker text-white font-medium py-2 rounded-lg transition">Publicar</button>
            </div>
          </form>
        </div>
      `);
    }

    async function submitNewGame(e) {
      e.preventDefault();
      try {
        await api('/games', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            court_id: parseInt(document.getElementById('game-court').value),
            date: document.getElementById('game-date').value,
            time: document.getElementById('game-time').value,
            players_needed: parseInt(document.getElementById('game-players').value),
            title: document.getElementById('game-title').value
          })
        });
        closeModal();
        toast('¡Partido publicado!');
        renderGames();
      } catch (err) {
        toast(err.message, 'error');
      }
    }

    function openJoinGameModal(gameId) {
      openModal(`
        <div class="p-6">
          <h3 class="text-xl font-bold mb-4">Anotarte al Partido</h3>
          <form onsubmit="submitJoinGame(event, ${gameId})">
            <div class="mb-4">
              <label class="block text-sm text-gray-400 mb-1">Nombre</label>
              <input type="text" id="join-name" required
                class="w-full bg-dark border border-gray-700 rounded-lg px-4 py-2 text-white"
                placeholder="Tu nombre">
            </div>
            <div class="mb-4">
              <label class="block text-sm text-gray-400 mb-1">Teléfono</label>
              <input type="tel" id="join-phone" required
                class="w-full bg-dark border border-gray-700 rounded-lg px-4 py-2 text-white"
                placeholder="099 123 456">
            </div>
            <div class="flex gap-3">
              <button type="button" onclick="closeModal()" class="flex-1 bg-gray-700 hover:bg-gray-600 py-2 rounded-lg transition">Cancelar</button>
              <button type="submit" class="flex-1 bg-accent hover:bg-accent-darker text-white font-medium py-2 rounded-lg transition">Confirmar</button>
            </div>
          </form>
        </div>
      `);
    }

    async function submitJoinGame(e, gameId) {
      e.preventDefault();
      const name = document.getElementById('join-name').value.trim();
      const phone = document.getElementById('join-phone').value.trim();

      try {
        await api(`/games/${gameId}/join`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, phone })
        });
        closeModal();
        toast('¡Anotado!');
        renderGames();
      } catch (err) {
        toast(err.message, 'error');
      }
    }

    async function renderMyBookings() {
      const app = document.getElementById('app');
      app.innerHTML = `<h2 class="text-2xl font-bold mb-6">📋 Mis Reservas</h2><p class="text-gray-400">Cargando...</p>`;

      try {
        const bookings = await api('/bookings');
        const games = await api('/games');

        const myPhone = localStorage.getItem('canchas-phone') || '';
        
        app.innerHTML = `
          <div class="mb-6">
            <label class="block text-sm text-gray-400 mb-2">Tu teléfono (para ver tus reservas)</label>
            <div class="flex gap-2">
              <input type="tel" id="my-phone" value="${myPhone}" placeholder="099 123 456"
                class="bg-card border border-gray-700 rounded-lg px-4 py-2 text-white flex-1">
              <button onclick="savePhoneAndReload()" class="bg-primary hover:bg-primary-darker text-black font-medium px-4 py-2 rounded-lg">Buscar</button>
            </div>
          </div>

          ${!myPhone ? '<p class="text-gray-400 text-sm">Ingresá tu teléfono para ver tus reservas</p>' : ''}

          <h3 class="font-semibold mb-3 text-gray-400">Reservas de cancha</h3>
          ${bookings.filter(b => b.client_phone === myPhone).length === 0 ? 
            '<p class="text-gray-500 mb-6 text-sm">No tenés reservas</p>' :
            `<div class="space-y-3 mb-8">${bookings.filter(b=>b.client_phone===myPhone).map(b=>`
              <div class="bg-card rounded-xl p-4 border border-gray-800 flex justify-between items-center">
                <div>
                  <h4 class="font-medium">${b.court_name}</h4>
                  <p class="text-gray-400 text-sm">${b.sport_info?.emoji || ''} ${formatDate(b.date)} · ${b.time}</p>
                </div>
                <button onclick="cancelBooking(${b.id})" class="text-red-400 hover:text-red-300 text-sm">Cancelar</button>
              </div>
            `).join('')}</div>`
          }

          <h3 class="font-semibold mb-3 text-gray-400">Partidos anotado</h3>
          ${games.filter(g => {
            const participants = db.prepare?.() || [];
            return false; // participants loaded separately
          }).length === 0 ? 
            '<p class="text-gray-500 text-sm">No estás anotado en ningún partido</p>' : ''}
        `;
      } catch (e) {
        app.innerHTML = `<p class="text-red-400">Error cargando datos</p>`;
      }
    }

    function savePhoneAndReload() {
      const phone = document.getElementById('my-phone').value.trim();
      localStorage.setItem('canchas-phone', phone);
      renderMyBookings();
    }

    async function cancelBooking(id) {
      if (!confirm('¿Cancelar esta reserva?')) return;
      try {
        await api(`/bookings/${id}`, { method: 'DELETE' });
        toast('Reserva cancelada');
        renderMyBookings();
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    async function renderAdmin() {
      const app = document.getElementById('app');
      courts = await api('/courts');

      app.innerHTML = `
        <h2 class="text-2xl font-bold mb-6">⚙️ Admin</h2>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
          <div>
            <div class="flex justify-between items-center mb-4">
              <h3 class="font-semibold text-lg">Canchas</h3>
              <button onclick="openNewCourtModal()" class="bg-primary hover:bg-primary-darker text-black font-medium px-3 py-1.5 rounded-lg text-sm">
                + Nueva
              </button>
            </div>
            <div class="space-y-3">
              ${courts.map(c => `
                <div class="bg-card rounded-xl p-4 border border-gray-800">
                  <div class="flex justify-between items-start">
                    <div>
                      <h4 class="font-medium">${c.name}</h4>
                      <p class="text-gray-400 text-sm">${c.sport_info?.emoji || ''} ${c.sport_info?.name || c.sport} · ${c.location || 'Sin ubicación'}</p>
                      <p class="text-primary text-sm mt-1">$${c.price_hour}/hora</p>
                    </div>
                    <div class="flex gap-2">
                      <button onclick="toggleCourtActive(${c.id}, ${c.active ? 0 : 1})" 
                        class="text-xs px-2 py-1 rounded ${c.active ? 'bg-green-500/20 text-green-400' : 'bg-gray-700 text-gray-400'}">
                        ${c.active ? 'Activa' : 'Inactiva'}
                      </button>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>

          <div>
            <h3 class="font-semibold text-lg mb-4">Estadísticas</h3>
            <div class="bg-card rounded-xl p-5 border border-gray-800">
              <div class="grid grid-cols-2 gap-4">
                <div class="text-center p-4 bg-dark rounded-lg">
                  <div class="text-3xl font-bold text-primary">${courts.length}</div>
                  <div class="text-gray-400 text-sm">Canchas</div>
                </div>
                <div class="text-center p-4 bg-dark rounded-lg">
                  <div class="text-3xl font-bold text-accent">${await getGamesCount()}</div>
                  <div class="text-gray-400 text-sm">Partidos</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    async function getGamesCount() {
      try {
        const games = await api('/games');
        return games.length;
      } catch { return 0; }
    }

    async function toggleCourtActive(id, active) {
      try {
        const court = await api(`/courts/${id}`);
        await api(`/courts/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ active })
        });
        toast(active ? 'Cancha activada' : 'Cancha desactivada');
        renderAdmin();
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    function openNewCourtModal() {
      const sportOptions = sports.map(s => `<option value="${s.id}">${s.emoji} ${s.name}</option>`).join('');
      
      openModal(`
        <div class="p-6">
          <h3 class="text-xl font-bold mb-4">Nueva Cancha</h3>
          <form onsubmit="submitNewCourt(event)">
            <div class="mb-4">
              <label class="block text-sm text-gray-400 mb-1">Nombre</label>
              <input type="text" id="court-name" required
                class="w-full bg-dark border border-gray-700 rounded-lg px-4 py-2 text-white">
            </div>
            <div class="mb-4">
              <label class="block text-sm text-gray-400 mb-1">Deporte</label>
              <select id="court-sport" required class="w-full bg-dark border border-gray-700 rounded-lg px-4 py-2 text-white">
                ${sportOptions}
              </select>
            </div>
            <div class="mb-4">
              <label class="block text-sm text-gray-400 mb-1">Ubicación</label>
              <input type="text" id="court-location"
                class="w-full bg-dark border border-gray-700 rounded-lg px-4 py-2 text-white"
                placeholder="Av. Brasil 1234">
            </div>
            <div class="mb-4">
              <label class="block text-sm text-gray-400 mb-1">Precio por hora ($)</label>
              <input type="number" id="court-price" required min="0" value="500"
                class="w-full bg-dark border border-gray-700 rounded-lg px-4 py-2 text-white">
            </div>
            <div class="flex gap-3">
              <button type="button" onclick="closeModal()" class="flex-1 bg-gray-700 hover:bg-gray-600 py-2 rounded-lg transition">Cancelar</button>
              <button type="submit" class="flex-1 bg-primary hover:bg-primary-darker text-black font-medium py-2 rounded-lg transition">Crear</button>
            </div>
          </form>
        </div>
      `);
    }

    async function submitNewCourt(e) {
      e.preventDefault();
      try {
        await api('/courts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('court-name').value.trim(),
            sport: document.getElementById('court-sport').value,
            location: document.getElementById('court-location').value.trim(),
            price_hour: parseInt(document.getElementById('court-price').value)
          })
        });
        closeModal();
        toast('¡Cancha creada!');
        courts = await api('/courts');
        renderAdmin();
      } catch (err) {
        toast(err.message, 'error');
      }
    }

    // ==================== ROUTER ====================
    async function router() {
      const { page, query } = getPageFromHash();
      currentPage = page;

      // Update active nav
      document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('text-primary', 'font-semibold'));
      const navMap = { home: 'nav-courts', games: 'nav-games', 'my-bookings': 'nav-my', admin: 'nav-admin' };
      if (navMap[page]) document.getElementById(navMap[page])?.classList.add('text-primary', 'font-semibold');

      try {
        switch (page) {
          case 'court': return renderCourt(query);
          case 'games': return renderGames(query);
          case 'my-bookings': return renderMyBookings();
          case 'admin': return renderAdmin();
          default: return renderHome(query);
        }
      } catch (e) {
        document.getElementById('app').innerHTML = `<p class="text-red-400">Error: ${e.message}</p>`;
      }
    }

    window.addEventListener('hashchange', router);
    window.addEventListener('load', () => {
      sports = []; // will be loaded on demand
      router();
    });
  </script>
</body>
</html>
